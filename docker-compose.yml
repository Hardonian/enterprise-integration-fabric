services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ${DB_NAME:-integration_fabric}
      MARIADB_USER: ${DB_USER:-fabric}
      MARIADB_PASSWORD: ${DB_PASSWORD:-fabric_dev_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-fabric_root_password}
    ports: ["${DB_HOST_PORT:-3307}:3306"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes: ["mariadb-data:/var/lib/mysql"]
  redpanda:
    image: redpandadata/redpanda:v24.3.8
    command: ["redpanda", "start", "--overprovisioned", "--smp", "1", "--memory", "512M", "--reserve-memory", "0M", "--node-id", "0", "--check=false", "--kafka-addr", "0.0.0.0:9092", "--advertise-kafka-addr", "redpanda:9092"]
    ports: ["${REDPANDA_KAFKA_HOST_PORT:-19092}:9092", "${REDPANDA_HTTP_HOST_PORT:-9644}:9644"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=redpanda:9092 | grep -E 'Healthy:[[:space:]]+true'"]
      interval: 10s
      timeout: 5s
      retries: 10
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password}
    ports: ["${KEYCLOAK_PORT:-8081}:8080"]
    volumes: ["./infra/local/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro"]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DB_URL: ${DB_URL:-jdbc:mariadb://mariadb:3306/integration_fabric}
      DB_USER: ${DB_USER:-fabric}
      DB_PASSWORD: ${DB_PASSWORD:-fabric_dev_password}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-false}
      BROKER_ENABLED: ${BROKER_ENABLED:-true}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-redpanda:9092}
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI:-http://keycloak:8080/realms/integration-fabric}
    depends_on:
      mariadb: { condition: service_healthy }
      redpanda: { condition: service_started }
      keycloak: { condition: service_started }
    ports: ["${API_HOST_PORT:-8080}:8080"]
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile=false && pnpm dev"
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8080}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.svelte-kit
    ports: ["${WEB_HOST_PORT:-5173}:5173"]
    depends_on: [api]
volumes:
  mariadb-data:
