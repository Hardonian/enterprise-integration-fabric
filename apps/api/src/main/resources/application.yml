server:
  port: ${API_PORT:8080}
spring:
  application:
    name: enterprise-integration-fabric-api
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/integration_fabric}
    username: ${DB_USER:fabric}
    password: ${DB_PASSWORD:fabric_dev_password}
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8081/realms/integration-fabric}
app:
  version: ${APP_VERSION:0.1.0}
  dev-auth-enabled: ${DEV_AUTH_ENABLED:false}
  broker-enabled: ${BROKER_ENABLED:false}
  kafka-bootstrap: ${KAFKA_BOOTSTRAP:localhost:19092}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
camel:
  springboot:
    name: integration-fabric-routes
management:
  endpoints:
    web:
      exposure:
        include: health,info
