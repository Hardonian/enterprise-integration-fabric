services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports: ["${DB_HOST_PORT:-3306}:3306"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes: ["mariadb-data:/var/lib/mysql"]
  redpanda:
    image: redpandadata/redpanda:v24.3.8
    restart: unless-stopped
    command: ["redpanda", "start", "--smp", "1", "--memory", "1G", "--reserve-memory", "0M", "--node-id", "0", "--check=false", "--kafka-addr", "0.0.0.0:9092", "--advertise-kafka-addr", "redpanda:9092"]
    ports: ["${REDPANDA_KAFKA_HOST_PORT:-19092}:9092", "${REDPANDA_HTTP_HOST_PORT:-9644}:9644"]
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=redpanda:9092 | grep -E 'Healthy:[[:space:]]+true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes: ["redpanda-data:/var/lib/redpanda/data"]
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    command: ["start", "--http-enabled=true", "--proxy-headers=xforwarded"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports: ["${KEYCLOAK_PORT:-8081}:8080"]
    volumes: ["keycloak-data:/opt/keycloak/data"]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_URL: ${DB_URL:-jdbc:mariadb://mariadb:3306/integration_fabric}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DEV_AUTH_ENABLED: "false"
      BROKER_ENABLED: "true"
      KAFKA_BOOTSTRAP: redpanda:9092
      OIDC_ISSUER_URI: ${OIDC_ISSUER_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mariadb: { condition: service_healthy }
      redpanda: { condition: service_started }
      keycloak: { condition: service_started }
    ports: ["${API_HOST_PORT:-8080}:8080"]
  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    restart: unless-stopped
    ports: ["${WEB_HOST_PORT:-8080}:80"]
    depends_on: [api]
volumes:
  mariadb-data:
  redpanda-data:
  keycloak-data:
